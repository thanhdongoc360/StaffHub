name: Backend CI (Laravel + PHPUnit)

on:
  push:
    branches: [main, develop, staging]
    paths:
      - 'backend/**'
      - '.github/workflows/ci-backend.yml'
      - 'docker-compose.yml'
  pull_request:
    branches: [main, develop, staging]
    paths:
      - 'backend/**'

jobs:
  test:
    name: Test Laravel & Database
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: staffhub_test
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
        ports:
          - 3306:3306

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo, pdo_mysql, bcmath, gd, json, curl
          tools: composer:v2
          coverage: none

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
        working-directory: backend

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install composer dependencies
        working-directory: backend
        run: composer install --no-interaction --prefer-dist --no-progress --no-suggest

      - name: Copy environment file
        working-directory: backend
        run: cp .env.example .env.testing

      - name: Generate application key
        working-directory: backend
        run: php artisan key:generate --env=testing

      - name: Wait for MySQL
        run: |
          until mysqladmin ping -h127.0.0.1 -uroot -proot --silent; do
            echo 'waiting for mysql...'
            sleep 1
          done

      - name: Run migrations
        working-directory: backend
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: staffhub_test
          DB_USERNAME: root
          DB_PASSWORD: root
        run: php artisan migrate --env=testing --force

      - name: Run PHPUnit tests
        working-directory: backend
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: staffhub_test
          DB_USERNAME: root
          DB_PASSWORD: root
        run: ./vendor/bin/phpunit

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phpunit-results
          path: backend/junit.xml
        continue-on-error: true
